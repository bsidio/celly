site_name: Celly
site_description: Native C#/.NET implementation of the Common Expression Language (CEL)
site_url: https://bsidio.github.io/celly/
repo_url: https://github.com/bsidio/celly
repo_name: bsidio/celly

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - The CEL Language: guide/language.md
      - Environments & Programs: guide/api.md
      - Extension Libraries: guide/extensions.md
      - Protobuf Support: guide/protobuf.md
      - Errors & Absorption: guide/errors.md
  - Internals — How It Works:
      - Architecture Overview: internals/architecture.md
      - Lexer & Parser: internals/parser.md
      - Macros: internals/macros.md
      - The Value Model: internals/values.md
      - Type Checker: internals/checker.md
      - Planner & Evaluator: internals/evaluator.md
      - Protobuf Integration: internals/protobuf.md
      - Conformance Testing: internals/conformance.md
  - Design History: PLAN.md
