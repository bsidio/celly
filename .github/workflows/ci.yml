name: CI

on:
  push:
    branches: [main]
  # Run PR builds only after a review is submitted (see the `if` gate below for approvals),
  # instead of on every PR/push — so CI runs on approved PRs, not all PRs.
  pull_request_review:
    types: [submitted]

jobs:
  build-test:
    # Pushes to main always run; PR reviews run only when the review is an approval.
    if: >-
      github.event_name == 'push' ||
      github.event.review.state == 'approved'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # On an approval, build the PR's head commit (not the base branch).
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build
        run: dotnet build Celly.sln --configuration Release
      - name: Test
        run: dotnet test Celly.sln --configuration Release --no-build --logger "trx" --results-directory TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults
          retention-days: 7

  pack:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Pack
        run: |
          dotnet pack src/Celly --configuration Release -o artifacts
          dotnet pack src/Celly.Protobuf --configuration Release -o artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
